<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Queens AI Game - 3D Visualization</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>N-Queens AI Game</h1>
            <p>Solve the N-Queens problem - Human vs AI</p>
        </div>

        <div class="control-panel">
            <div class="settings">
                <label for="boardSize">Board Size (N):</label>
                <select id="boardSize">
                    <option value="4">4x4</option>
                    <option value="5">5x5</option>
                    <option value="6">6x6</option>
                    <option value="7">7x7</option>
                    <option value="8" selected>8x8</option>
                    <option value="9">9x9</option>
                    <option value="10">10x10</option>
                    <option value="12">12x12</option>
                </select>

                <label for="gameMode">Game Mode:</label>
                <select id="gameMode">
                    <option value="human">Human Player</option>
                    <option value="ai" selected>AI vs AI</option>
                    <option value="mixed">Human vs AI</option>
                </select>

                <label for="aiDifficulty">AI Difficulty:</label>
                <select id="aiDifficulty" disabled>
                    <option value="easy">Easy (Random)</option>
                    <option value="medium">Medium (Smart)</option>
                    <option value="hard" selected>Hard (Optimal)</option>
                </select>

                <label for="visualMode">Visualization Mode:</label>
                <select id="visualMode">
                    <option value="2d" selected>2D Grid</option>
                    <option value="3d">3D Model</option>
                </select>

                <button id="startBtn" class="btn-primary">New Game</button>
                <button id="resetBtn" class="btn-secondary">Reset Board</button>
                <button id="solveBtn" class="btn-secondary">Show Solution</button>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <span class="label">Current Mode:</span>
                    <span id="modeDisplay" class="value">Human Player</span>
                </div>
                <div class="info-item">
                    <span class="label">Board Size:</span>
                    <span id="sizeDisplay" class="value">8x8</span>
                </div>
                <div class="info-item">
                    <span class="label">Queens Placed:</span>
                    <span id="queensCount" class="value">0 / 8</span>
                </div>
                <div class="info-item">
                    <span class="label">Conflicts:</span>
                    <span id="conflictCount" class="value">0</span>
                </div>
                <div class="info-item">
                    <span class="label">Status:</span>
                    <span id="status" class="value">Ready</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <!-- 2D Board View -->
            <div id="board2D" class="board-container active"></div>

            <!-- 3D Canvas -->
            <canvas id="canvas3D"></canvas>

            <!-- Legend -->
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box queen"></div>
                    <span>Queen</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box threat"></div>
                    <span>Threatened</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box safe"></div>
                    <span>Safe</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box placed"></div>
                    <span>Placed</span>
                </div>
            </div>
        </div>

        <div class="solution-panel" id="solutionPanel">
            <h3>Solutions Found:</h3>
            <div id="solutionsContainer"></div>
        </div>
    </div>

    <script src="ai.js"></script>
    <script src="game.js"></script>
    <script src="3d-renderer.js"></script>
</body>
</html>
